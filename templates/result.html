<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Prediction Result</h1>

    <div class="result">

        <h2>{{ prediction }}</h2>

        <h3>Flood Probability: {{ flood_probability }}%</h3>
        <h3>No Flood Probability: {{ no_flood_probability }}%</h3>

        <a class="button" href="/">Predict Again</a>

    </div>

</div>

</body>
</html>
